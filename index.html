<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Okinawa Birthday Trip 2026</title>
    <!-- 引入 Tailwind CSS & Vue.js -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #E0F2FE; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .content-card { margin-top: -30px; border-radius: 30px 30px 0 0; position: relative; z-index: 20; }
        .tab-active { background-color: #2dd4bf; color: white; box-shadow: 0 4px 12px rgba(45, 212, 191, 0.3); }
    </style>
</head>
<body class="max-w-md mx-auto min-h-screen shadow-xl bg-sky-50">
    <div id="app" class="relative pb-24">
        
        <!-- Header Banner & Tabs -->
        <header class="relative w-full h-[250px]">
            <img src="okinawa.jpg" alt="Okinawa Banner" class="w-full h-full object-cover">
            <!-- Floating Tab Navigation -->
            <div class="absolute right-4 bottom-12 flex space-x-3 z-30">
                <button v-for="t in tabs" :key="t.id" @click="currentTab = t.id"
                        :class="['p-3 rounded-2xl transition-all', currentTab === t.id ? 'tab-active' : 'bg-white/80 text-teal-600']">
                    <i :data-lucide="t.icon" class="w-6 h-6"></i>
                </button>
            </div>
        </header>

        <!-- Main Content (圓弧無縫銜接) -->
        <main class="content-card bg-[#E0F2FE] min-h-screen p-4">
            
            <!-- 分頁 1: 每日行程 -->
            <div v-if="currentTab === 'itinerary'">
                <div class="bg-white/60 rounded-2xl p-4 mb-4 flex items-center justify-between border border-white">
                    <div class="flex items-center space-x-3">
                        <i data-lucide="sun" class="text-orange-400 w-10 h-10"></i>
                        <div><p class="text-2xl font-bold text-gray-700">26°C</p><p class="text-xs text-gray-500">體感 28°C · 那霸市</p></div>
                    </div>
                </div>

                <!-- 橫向滑動日期 -->
                <div class="flex space-x-4 overflow-x-auto hide-scrollbar mb-6 pb-2">
                    <div v-for="d in dates" @click="selectedDate = d.day"
                         :class="['flex-shrink-0 w-16 h-20 rounded-2xl flex flex-col items-center justify-center cursor-pointer transition-all', 
                                 selectedDate === d.day ? 'bg-teal-400 text-white shadow-lg' : 'bg-white text-gray-400']">
                        <span class="text-xs font-bold uppercase">{{ d.week }}</span>
                        <span class="text-2xl font-bold">{{ d.day }}</span>
                    </div>
                </div>

                <div id="itinerary-list" class="space-y-4">
                    <!-- 航班卡片 (僅 Day 1) -->
                    <div v-if="selectedDate === 6" class="bg-gradient-to-r from-teal-400 to-cyan-400 rounded-2xl p-5 text-white shadow-md">
                        <div class="flex justify-between items-center mb-2"><span class="text-xs font-bold bg-white/20 px-2 py-1 rounded">UO828</span><i data-lucide="plane"></i></div>
                        <div class="flex justify-between items-center px-4">
                            <div class="text-center"><p class="text-2xl font-bold">14:25</p><p class="text-[10px]">HKG</p></div>
                            <div class="border-b border-dashed flex-grow mx-4"></div>
                            <div class="text-center"><p class="text-2xl font-bold">18:05</p><p class="text-[10px]">OKA</p></div>
                        </div>
                    </div>
                    <!-- 行程項目 -->
                    <div v-for="(item, idx) in dailyItinerary[selectedDate]" :key="idx" class="bg-white rounded-2xl p-4 shadow-sm border border-teal-50">
                        <div class="flex justify-between"><h3 class="font-bold text-gray-800">{{ item.name }}</h3><span class="text-[10px] text-teal-500">{{ item.category }}</span></div>
                        <p class="text-xs text-gray-400 mt-1">🕒 {{ item.time }}</p>
                        <button @click="openNav(item.name)" class="mt-3 text-xs text-teal-600 font-bold flex items-center"><i data-lucide="navigation" class="w-3 h-3 mr-1"></i>導航</button>
                    </div>
                </div>
            </div>

            <!-- 分頁 2: 資訊 (匯率、住宿) -->
            <div v-if="currentTab === 'info'" class="space-y-4">
                <div class="bg-white rounded-3xl p-6 shadow-sm">
                    <h2 class="text-lg font-bold text-gray-800 mb-4 flex items-center"><i data-lucide="refresh-cw" class="w-5 h-5 mr-2"></i>匯率換算</h2>
                    <input type="number" v-model="jpyInput" class="w-full text-2xl font-bold border-b-2 border-teal-100 outline-none mb-2">
                    <p class="text-teal-600 font-bold">≈ {{ (jpyInput * 0.051).toFixed(2) }} HKD</p>
                </div>
                <div class="bg-white rounded-3xl p-6 shadow-sm">
                    <h3 class="font-bold">🏨 住宿資訊</h3>
                    <p class="text-sm text-gray-600">ナナマンビルⅡ, 那霸</p>
                    <button @click="openNav('ナナマンビルⅡ')" class="mt-3 w-full bg-teal-50 text-teal-600 py-2 rounded-xl text-sm font-bold">地圖導航</button>
                </div>
            </div>
        </main>

        <!-- Floating Button -->
        <button v-if="currentTab !== 'info'" class="fixed bottom-24 right-6 w-14 h-14 bg-teal-500 text-white rounded-full shadow-2xl flex items-center justify-center z-50">
            <i data-lucide="plus" class="w-8 h-8"></i>
        </button>
    </div>

    <script>
        const { createApp, ref, onMounted, updated } = Vue;
        createApp({
            setup() {
                const currentTab = ref('itinerary');
                const selectedDate = ref(6);
                const jpyInput = ref(1000);
                const tabs = [{id:'itinerary', icon:'map-pinned'}, {id:'info', icon:'info'}, {id:'shopping', icon:'shopping-basket'}, {id:'cost', icon:'banknote'}];
                const dates = [{week:'Fri', day:6}, {week:'Sat', day:7}, {week:'Sun', day:8}, {week:'Mon', day:9}];
                const dailyItinerary = {
                    6: [{category:'美食', name:'國際通 屋台村', time:'19:30', note:'慶祝生日！'}],
                    7: [{category:'景點', name:'知念岬', time:'10:00', note:'海景超美'}]
                };
                const openNav = (name) => window.open(`https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}`, '_blank');
                onMounted(() => { lucide.createIcons(); Sortable.create(document.getElementById('itinerary-list'), {animation: 150}); });
                updated(() => lucide.createIcons());
                return { currentTab, tabs, dates, selectedDate, dailyItinerary, openNav, jpyInput };
            }
        }).mount('#app');
    </script>
</body>
</html>
